<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
<body>
     
    <main>
        <div class="container mt-5">


            <form class="createProductForm row g-3 needs-validation col-6 m-auto" novalidate  autocomplete="off">
              <h1 class="text-center">Create Product</h1>

 

  <div class="col-md-12">
    <label for="Brand" class="form-label"> Brand</label>
    <input type="text" class="form-control" id="Brand" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>

  <div class="col-md-12">
    <label for="model" class="form-label"> Model</label>
    <input type="text" class="form-control" id="model" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>

  <div class="col-md-12">
    <label for="category" class="form-label"> Category</label>
    <input type="text" class="form-control" id="category" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>

    <div class="col-md-12">
        <label for="description" class="form-label"> Description</label>
        <input type="text" class="form-control" id="description" value="" required>
        <div class="valid-feedback">
        Looks good!
        </div>

 <div class="col-md-12">
        <label for="price" class="form-label"> Price</label>
        <input type="number" class="form-control" id="price" value="" required>
        <div class="valid-feedback">
        Looks good!
        </div>
        
        
         <div class="col-md-12">
        <label for="rating" class="form-label"> Rating</label>
        <input type="number" class="form-control" id="rating" value="" required>
        <div class="valid-feedback">
        Looks good!
        </div>

           <div class="col-md-12">
        <label for="imageurl" class="form-label">Image URL</label>
        <input type="url" class="form-control" id="imageurl" value="" required>
        <div class="valid-feedback">
        Looks good!
        </div>
    <img class="img-fluid imagePreview" src="" alt="image">  

        <div class="col-12">    
   
            <button class="btn btn-primary" type="submit">Save</button>
            <button class="btn btn-warning" type="reset">Reset</button>
        </div>
</form>



        </div>
    </main>


<script src="./createProduct.js"></script>
<script src="/Проект И-нет Магазин/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
