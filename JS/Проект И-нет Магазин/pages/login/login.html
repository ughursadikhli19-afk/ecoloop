<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
<body>
      <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Navbar</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="/index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./pages/registration/registration.html">Sign Up</a>
              </li>
          
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main>
        <div class="container mt-5">


            <form class="row g-3 needs-validation col-6 m-auto" novalidate  autocomplete="off">
              <h1>Log in</h1>

 

               <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-12">
    <label for="username" class="form-label"> Username</label>
    <input type="text" class="form-control" id="Username" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
 
    
 
  

         <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-12">
    <label for="password" class="form-label"> Password</label>
    <input type="password" class="form-control" id="email" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
 
  


  <div class="col-12">
    <button class="btn btn-primary" type="submit">Log in</button>
  </div>
</form>


        </div>
    </main>


<script src="./login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
