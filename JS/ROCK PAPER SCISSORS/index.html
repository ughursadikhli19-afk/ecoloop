<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<style>
.app {
  display: grid;
  grid-template-columns: 33% 34% 33%;
  text-align: center;
}
.center {
  display: grid;
  grid-template-columns: 50% 50%;
  background-color: rgb(104, 104, 213);
  border-radius: 10px;
  color: white;
  align-items: center;
  font-size: 20px;
  padding: 20px;
}
.center img {
  width: 80px;
}
.option-img {
  width: 60px;
  cursor: pointer;
  transition: transform 0.2s;
}
.option-img:hover {
  transform: scale(1.2);
}
.winPlayer1,
.winPlayer2 {
  display: none;
}
</style>

<div class="app p-3">

  <div class="left">
    <h4>Player 1</h4>
    <div class="player1WinCount fs-3">0</div>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSNPGBaKHdIj1yL4rJmtQHnHtKbB9e17LNiR4sVC1XHQ&s" alt="Stone" class="player1 option-img mb-2"><br>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdLOlaD06N9ZE-sUmkiHehxLxwoOe3EgyQAbUBpEOTGg&s" alt="Scissors" class="player1 option-img mb-2"><br>
    <img src="https://www.clipartmax.com/png/middle/428-4288822_transparent-rock-paper-scissors-png.png" alt="Paper" class="player1 option-img mb-2">

    <div class="my-3">
      <button class="winPlayer1 btn btn-warning">Win</button>
    </div>
  </div>


  <div class="center">
    <div class="player1Choose"></div>
    <div class="player2Choose"></div>
  </div>

  <div class="right">
    <h4>Player 2</h4>
    <div class="player2WinCount fs-3">0</div>

    <div class="my-3">
      <button class="winPlayer2 btn btn-warning">Win</button>
    </div>
  </div>
</div>

<script>
    const images={
    Stone: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSNPGBaKHdIj1yL4rJmtQHnHtKbB9e17LNiR4sVC1XHQ&s",
    Scissors: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdLOlaD06N9ZE-sUmkiHehxLxwoOe3EgyQAbUBpEOTGg&s",
    Paper: "https://www.clipartmax.com/png/middle/428-4288822_transparent-rock-paper-scissors-png.png"      
};  
    
let player1WinCount = 0;
let player2WinCount = 0;

const player1WinCountElement = document.querySelector(".player1WinCount");
const player2WinCountElement = document.querySelector(".player2WinCount");
const player1Choose = document.querySelector(".player1Choose");
const player2Choose = document.querySelector(".player2Choose");
const winPlayer1 = document.querySelector(".winPlayer1");
const winPlayer2 = document.querySelector(".winPlayer2");

const buttons = document.querySelectorAll(".player1");

function startRound(player1Choice) {
  const options = ["Stone", "Scissors", "Paper"];
  const player2Choice = options[Math.floor(Math.random() * options.length)];

  player1Choose.innerHTML = `<img src="${images[player1Choice]}" alt="${player1Choice}">`;
  player2Choose.innerHTML = `<img src="${images[player2Choice]}" alt="${player2Choice}">`;

  winPlayer1.style.display = "none";
  winPlayer2.style.display = "none";

  if (
    (player1Choice === "Stone" && player2Choice === "Scissors") ||
    (player1Choice === "Scissors" && player2Choice === "Paper") ||
    (player1Choice === "Paper" && player2Choice === "Stone")
  ) {
    player1WinCount++;
    winPlayer1.style.display = "block";
  } else if (player1Choice === player2Choice) {

  } else {
    player2WinCount++;
    winPlayer2.style.display = "block";
  }

  player1WinCountElement.textContent = player1WinCount;
  player2WinCountElement.textContent = player2WinCount;

  if (player1WinCount === 5 || player2WinCount === 5) {
    setTimeout(() => {
      alert(player1WinCount === 5 ? "Player 1 wins!" : "Player 2 wins!");
      buttons.forEach(btn => btn.disabled = true);
    }, 300);
  } else {
    setTimeout(() => {
      player1Choose.innerHTML = "";
      player2Choose.innerHTML = "";
      winPlayer1.style.display = "none";
      winPlayer2.style.display = "none";
    }, 2000);
  }
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    const choice = btn.alt; 
    startRound(choice);
  });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
