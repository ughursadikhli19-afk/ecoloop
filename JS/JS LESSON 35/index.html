<!DOCTYPE html>

<html lang="ru">

<head>

  <meta charset="UTF-8">

  <title>Login через Web API</title>

  <style>

    body {

      font-family: Arial;

      background: #f5f5f5;

    }

    .container {

      width: 300px;

      margin: 100px auto;

      padding: 20px;

      background: white;

      border-radius: 8px;

    }

    input {

      width: 100%;

      padding: 8px;

      margin-bottom: 10px;

    }

    button {

      width: 100%;

      padding: 10px;

      cursor: pointer;

    }

    .error {

      color: red;

    }

    .success {

      color: green;

    }

  </style>

</head>

<body>

<div class="container">

  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Войти</button>

  <p id="message"></p>

</div>

<script src="./script.js"></script>

</body>

</html>
