<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D MODEL</title>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            /* 🔥 ОБЯЗАТЕЛЬНО для 3D */
            perspective: 800px;
        }

        .box {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #ff0000, #c3ff00, #4ce300, #00c3ff, #ff00c3 );

            display: flex;
            justify-content: center;
            align-items: center;

            color: rgb(0, 0, 0);
            font-size: 20px;

            /* плавность */
            transition: transform 0.1s linear;
            box-shadow:10px 50px 20px rgba(0, 0, 0, 0.512);
        }
    </style>
</head>

<body>

<div class="box">
    3D BOX
</div>

<script>
$(function () {

    let angleX = 0;
    let angleY = 0;
    let angleZ = 0;
    let translateZ = 0;

    function updateTransform() {
        $('.box').css(
            'transform',
            `
            rotateX(${angleX}deg)
            rotateY(${angleY}deg)
            rotateZ(${angleZ}deg)
            translateZ(${translateZ}px)
            `
        );
    }

    $(document).keydown(function (e) {

        const key = e.key.toLowerCase();

        // 🔄 вращение
        if (key === 'd') angleZ += 5;
        if (key === 'a') angleZ -= 5;

        // 🔥 движение вперед / назад
        if (key === 'w') translateZ += 20;
        if (key === 's') translateZ -= 20;

        // 🎮 стрелки — вращение по X/Y
        if (e.key === 'ArrowUp') angleX -= 5;
        if (e.key === 'ArrowDown') angleX += 5;
        if (e.key === 'ArrowLeft') angleY -= 5;
        if (e.key === 'ArrowRight') angleY += 5;

        updateTransform();
    });

});
</script>

</body>
</html>
